  "sell:10000",
]

[[scenarios]]
name = "epoch_decay_after_3000_sell"
actions = [
  "sell:3000",
  "wait:43200",
  "sell:1000",
  "wait:86400",
  "sell:1000",
]

[[comparisons]]
name = "dump_500k_once_vs_50x_10k"
total_sell = "500000"
chunk_count = 50
